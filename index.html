<!DOCTYPE html>
<html>
<head>
  <title>Satyabati Hindu Hotel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f1f3f4;
      text-align: center;
    }

    header {
      background: #34a853;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .btn-main {
      background: #34a853;
      color: white;
      font-weight: bold;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .total-box {
      font-size: 26px;
      font-weight: bold;
      color: #34a853;
      background: #e6f4ea;
      padding: 10px;
      border-radius: 10px;
    }

    .hidden { display: none; }

    img {
      width: 250px;
      margin-top: 10px;
    }

    .success {
      color: green;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🍽️ Satyabati Hindu Hotel</header>

<div class="container">

  <input id="name" placeholder="Enter Name">
  <input id="phone" placeholder="Phone Number">

  <!-- ITEMS -->
  <div class="card">
    Rice & Fish Curry ₹60 <br>
    <button onclick="qty(0,-1)">-</button>
    <span id="q0">0</span>
    <button onclick="qty(0,1)">+</button>
  </div>

  <div class="card">
    Rice & Egg Curry ₹40 <br>
    <button onclick="qty(1,-1)">-</button>
    <span id="q1">0</span>
    <button onclick="qty(1,1)">+</button>
  </div>

  <div class="card">
    Rice & Veg Curry ₹30 <br>
    <button onclick="qty(2,-1)">-</button>
    <span id="q2">0</span>
    <button onclick="qty(2,1)">+</button>
  </div>

  <div class="total-box">
    Total: ₹ <span id="total">0</span>
  </div>

  <br>
  <button class="btn-main" onclick="showQR()">Pay & Order</button>

  <!-- QR SECTION -->
  <div id="qrBox" class="card hidden">

    <h3>Pay ₹ <span id="payAmount"></span></h3>

    <p style="color:red;"><b>Pay first, then click confirm</b></p>

    <img src="https://raw.githubusercontent.com/satyabatihotel-code/payment-page/main/qr.jpeg">

    <br><br>

    <button onclick="downloadQR()">⬇ Download QR</button>

    <br><br>

    <button class="btn-main" onclick="confirmPayment()">✅ I Have Paid</button>

  </div>

  <!-- SUCCESS SCREEN -->
  <div id="successBox" class="card hidden">

    <div class="success">✅ Payment Successful</div>

    <p>Order ID: <b id="orderId"></b></p>

    <h3>Receipt</h3>
    <div id="receipt"></div>

    <br>

    <button onclick="sendWhatsApp()">📩 Send Order on WhatsApp</button>

  </div>

</div>

<script>

let products = [
  {name:"Fish Curry",price:60,qty:0},
  {name:"Egg Curry",price:40,qty:0},
  {name:"Veg Curry",price:30,qty:0}
];

function qty(i,v){
  products[i].qty += v;
  if(products[i].qty<0) products[i].qty=0;
  document.getElementById("q"+i).innerText=products[i].qty;
  total();
}

function total(){
  let t=0;
  products.forEach(p=>t+=p.price*p.qty);
  document.getElementById("total").innerText=t;
}

function showQR(){
  let t=document.getElementById("total").innerText;
  if(t==0){alert("Select item");return;}
  document.getElementById("payAmount").innerText=t;
  document.getElementById("qrBox").classList.remove("hidden");
}

function downloadQR(){
  let a=document.createElement('a');
  a.href="https://raw.githubusercontent.com/satyabatihotel-code/payment-page/main/qr.jpeg";
  a.download="qr.jpeg";
  a.click();
}

function confirmPayment(){

  let id="ORD"+Math.floor(Math.random()*100000);
  document.getElementById("orderId").innerText=id;

  let rec="";
  let t=0;

  products.forEach(p=>{
    if(p.qty>0){
      rec+=p.name+" x "+p.qty+"<br>";
      t+=p.price*p.qty;
    }
  });

  rec+="<br><b>Total Paid: ₹"+t+"</b>";
  document.getElementById("receipt").innerHTML=rec;

  document.getElementById("qrBox").classList.add("hidden");
  document.getElementById("successBox").classList.remove("hidden");
}

function sendWhatsApp(){

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;

  let msg="Order Confirmed%0A";
  msg+="Name: "+name+"%0A";
  msg+="Phone: "+phone+"%0A";

  products.forEach(p=>{
    if(p.qty>0){
      msg+=p.name+" x "+p.qty+"%0A";
    }
  });

  msg+="Check payment done";

  window.open("https://wa.me/919836697502?text="+msg);
}

</script>

</body>
</html>
